name: Discord - Release Notifications

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post release to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_RELEASES }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NAME: ${{ github.event.release.name }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Missing DISCORD_WEBHOOK_URL_RELEASES secret"
            exit 1
          fi

          TITLE="${RELEASE_NAME:-${TAG}}"

          # Escape quotes/newlines for JSON
          ESC_TITLE="$(printf "%s" "$TITLE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read())[1:-1])')"

          cat > payload.json <<EOF
          {
            "username": "vEFPS Source Control",
            "embeds": [
              {
                "title": "New Release: ${ESC_TITLE}",
                "url": "${RELEASE_URL}",
                "fields": [
                  { "name": "Version", "value": "${TAG}", "inline": true },
                  { "name": "Published by", "value": "${ACTOR}", "inline": true }
                ]
              }
            ]
          }
          EOF

          curl -sS -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"
